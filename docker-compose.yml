version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: local-supabase-db-mock
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: local_dev_password
    ports:
      - "54322:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
